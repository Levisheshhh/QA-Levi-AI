name: Google Chat QA Comment Report

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: read
  repository-projects: read

jobs:
  report-new-ticket-comment:
    name: Report new ticket comment
    runs-on: ubuntu-latest
    if: ${{ !github.event.issue.pull_request }}
    steps:
      - name: Build and send Google Chat report
        uses: actions/github-script@v7
        env:
          GOOGLE_CHAT_WEBHOOK: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
          PROJECT_OWNER: Levisheshhh
          PROJECT_NUMBER: "1"
        with:
          github-token: ${{ secrets.PROJECT_READ_TOKEN || github.token }}
          script: |
            const webhook = process.env.GOOGLE_CHAT_WEBHOOK;
            if (!webhook) {
              core.setFailed("Missing GOOGLE_CHAT_WEBHOOK secret.");
              return;
            }

            const issue = context.payload.issue;
            const comment = context.payload.comment;
            const projectOwner = process.env.PROJECT_OWNER;
            const projectNumber = Number(process.env.PROJECT_NUMBER);

            const projectQuery = `
              query($issueId: ID!) {
                node(id: $issueId) {
                  ... on Issue {
                    projectItems(first: 20) {
                      nodes {
                        project {
                          number
                          title
                          url
                          owner {
                            ... on User {
                              login
                            }
                          }
                        }
                        fieldValues(first: 20) {
                          nodes {
                            ... on ProjectV2ItemFieldSingleSelectValue {
                              name
                              field {
                                ... on ProjectV2FieldCommon {
                                  name
                                }
                              }
                            }
                            ... on ProjectV2ItemFieldTextValue {
                              text
                              field {
                                ... on ProjectV2FieldCommon {
                                  name
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const projectResult = await github.graphql(projectQuery, {
              issueId: issue.node_id,
            });

            const projectItem = projectResult.node.projectItems.nodes.find((item) => {
              const project = item.project;
              return project?.number === projectNumber && project?.owner?.login === projectOwner;
            });

            if (!projectItem) {
              core.info(`Issue #${issue.number} is not in ${projectOwner}/projects/${projectNumber}; skipping.`);
              return;
            }

            const body = comment.body || "";
            const normalizedLines = body
              .replace(/\r/g, "")
              .split("\n")
              .map((line) => line.trim())
              .filter(Boolean);

            const fieldValue = (name) => {
              const match = normalizedLines.find((line) => {
                return line.toLowerCase().startsWith(`${name.toLowerCase()}:`);
              });
              return match ? match.slice(match.indexOf(":") + 1).trim() : "";
            };

            const environment = fieldValue("Environment");
            const browser = fieldValue("Browser");
            const status = fieldValue("Status");

            const isAttachmentOrProof = (line) => {
              return /^https?:\/\//i.test(line)
                || /^<img\b/i.test(line)
                || /^!\[.*\]\(/.test(line)
                || /^vid(eo)?:/i.test(line)
                || /^screen\s*shots?(?:\s*(?:and|&)\s*screen\s*recordings?)?\s*:?$/i.test(line)
                || /^screen\s*recordings?\s*:?$/i.test(line)
                || /^screen\s*records?\s*:?$/i.test(line)
                || /^screenshots?:/i.test(line)
                || /^recordings?:/i.test(line)
                || /^images?:/i.test(line)
                || /^evidence:/i.test(line)
                || /^attachment:/i.test(line);
            };

            const isFindingStopLine = (line) => {
              return isAttachmentOrProof(line)
                || /^[-_*]{3,}$/.test(line)
                || /^(environment|browser|mobile device|date|status|expected|actual|description|steps?|scenario|objective|result|note|comment|repo|project|signal):/i.test(line)
                || /^the (ff|following).*(failed|passed)/i.test(line)
                || /^go-live ticket review/i.test(line);
            };

            const extractFindings = () => {
              const startIndex = normalizedLines.findIndex((line) => /^findings?:/i.test(line));
              if (startIndex === -1) return [];

              const firstLine = normalizedLines[startIndex];
              const inlineFinding = firstLine.slice(firstLine.indexOf(":") + 1).trim();
              const lines = inlineFinding ? [inlineFinding] : [];

              for (const line of normalizedLines.slice(startIndex + 1)) {
                if (isFindingStopLine(line)) break;
                lines.push(line);
              }

              return lines
                .map((line) => line.replace(/^\s*[-*]\s+/, "").trim())
                .filter(Boolean)
                .slice(0, 12);
            };

            const findingLines = extractFindings();
            const requiredTemplateFields = [
              ["Environment", environment],
              ["Browser", browser],
              ["Status", status],
              ["Findings", findingLines.join("\n")],
            ];
            const missingFields = requiredTemplateFields
              .filter(([, value]) => !value.trim())
              .map(([name]) => name);

            if (missingFields.length) {
              core.info(`Comment #${comment.id} does not match the QA findings template. Missing: ${missingFields.join(", ")}. Skipping report.`);
              return;
            }

            const findings = findingLines.join("\n");

            const chatText = [
              `*New ticket comment report*`,
              `*Ticket:* <${issue.html_url}|#${issue.number} ${issue.title}>`,
              `*Commenter:* ${comment.user.login}`,
              ``,
              `*Extracted findings/update:*`,
              `Environment: ${environment}`,
              `Browser: ${browser}`,
              `Status: ${status}`,
              `Finding: ${findings}`,
            ].join("\n");

            const response = await fetch(webhook, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ text: chatText }),
            });

            if (!response.ok) {
              const text = await response.text();
              core.setFailed(`Google Chat webhook failed: ${response.status} ${text}`);
            }
