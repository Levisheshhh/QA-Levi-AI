name: Google Chat QA Comment Report

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: read
  repository-projects: read

jobs:
  report-new-ticket-comment:
    name: Report new ticket comment
    runs-on: ubuntu-latest
    if: ${{ !github.event.issue.pull_request }}
    steps:
      - name: Build and send Google Chat report
        uses: actions/github-script@v7
        env:
          GOOGLE_CHAT_WEBHOOK: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
          PROJECT_OWNER: Levisheshhh
          PROJECT_NUMBER: "1"
        with:
          github-token: ${{ secrets.PROJECT_READ_TOKEN || github.token }}
          script: |
            const webhook = process.env.GOOGLE_CHAT_WEBHOOK;
            if (!webhook) {
              core.setFailed("Missing GOOGLE_CHAT_WEBHOOK secret.");
              return;
            }

            const issue = context.payload.issue;
            const comment = context.payload.comment;
            const projectOwner = process.env.PROJECT_OWNER;
            const projectNumber = Number(process.env.PROJECT_NUMBER);

            const projectQuery = `
              query($issueId: ID!) {
                node(id: $issueId) {
                  ... on Issue {
                    projectItems(first: 20) {
                      nodes {
                        project {
                          number
                          title
                          url
                          owner {
                            ... on User {
                              login
                            }
                          }
                        }
                        fieldValues(first: 20) {
                          nodes {
                            ... on ProjectV2ItemFieldSingleSelectValue {
                              name
                              field {
                                ... on ProjectV2FieldCommon {
                                  name
                                }
                              }
                            }
                            ... on ProjectV2ItemFieldTextValue {
                              text
                              field {
                                ... on ProjectV2FieldCommon {
                                  name
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const projectResult = await github.graphql(projectQuery, {
              issueId: issue.node_id,
            });

            const projectItem = projectResult.node.projectItems.nodes.find((item) => {
              const project = item.project;
              return project?.number === projectNumber && project?.owner?.login === projectOwner;
            });

            if (!projectItem) {
              core.info(`Issue #${issue.number} is not in ${projectOwner}/projects/${projectNumber}; skipping.`);
              return;
            }

            const body = comment.body || "";
            const normalizedLines = body
              .replace(/\r/g, "")
              .split("\n")
              .map((line) => line.trim())
              .filter(Boolean);

            const fieldValue = (name) => {
              const match = normalizedLines.find((line) => {
                return line.toLowerCase().startsWith(`${name.toLowerCase()}:`);
              });
              return match ? match.slice(match.indexOf(":") + 1).trim() : "";
            };

            const environment = fieldValue("Environment") || "Not specified";
            const browser = fieldValue("Browser") || "Not specified";
            const status = fieldValue("Status") || "Not specified";

            const ignoredPrefixes = [
              "environment:",
              "browser:",
              "mobile device:",
              "date:",
              "status:",
              "expected:",
              "comment:",
              "repo:",
              "project:",
              "signal:",
            ];

            const findingStartIndex = normalizedLines.findIndex((line) => {
              return /^findings?:?$/i.test(line) || /^the (ff|following).*(failed|passed)/i.test(line);
            });

            const candidateLines = (findingStartIndex >= 0
              ? normalizedLines.slice(findingStartIndex + 1)
              : normalizedLines
            ).filter((line) => {
              const lower = line.toLowerCase();
              return !ignoredPrefixes.some((prefix) => lower.startsWith(prefix));
            });

            const findingLines = candidateLines
              .filter((line) => {
                return !/^[-_*]{3,}$/.test(line) && !/^<img\b/i.test(line);
              })
              .slice(0, 12);

            const findings = findingLines.length
              ? findingLines.join("\n")
              : "No specific finding text detected. Open the ticket comment for full details.";

            const chatText = [
              `*New ticket comment report*`,
              `*Ticket:* <${issue.html_url}|#${issue.number} ${issue.title}>`,
              `*Commenter:* ${comment.user.login}`,
              ``,
              `*Extracted findings/update:*`,
              `Environment: ${environment}`,
              `Browser: ${browser}`,
              `Status: ${status}`,
              `Finding: ${findings}`,
            ].join("\n");

            const response = await fetch(webhook, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ text: chatText }),
            });

            if (!response.ok) {
              const text = await response.text();
              core.setFailed(`Google Chat webhook failed: ${response.status} ${text}`);
            }
